<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Advanced Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">

        <div class="top-bar">
            <h2>Calculator</h2>

            <button id="theme-toggle">
                🌙
            </button>
        </div>

        <input
            type="text"
            id="display"
            disabled
        >

        <div id="history"></div>

        <div class="buttons">

            <!-- Row 1 -->
            <button>C</button>
            <button>⌫</button>
            <button>/</button>
            <button>*</button>

            <!-- Row 2 -->
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>

            <!-- Row 3 -->
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>

            <!-- Row 4 -->
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>=</button>

            <!-- Row 5 -->
            <button>0</button>
            <button>.</button>
            <button>√</button>
            <button>x²</button>

            <!-- Row 6 -->
            <button>sin</button>
            <button>cos</button>
            <button>tan</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
